services:
  redis:
    image: redis:7-alpine
    container_name: yoru_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - yoru_network

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: yoru-api:latest
    container_name: yoru_api
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379/0
      - RECEIPT_DB_URL=${RECEIPT_DB_URL:-sqlite:////app/data/receipt.db}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - API_DOMAIN=${API_DOMAIN}
      - API_URL=${API_URL}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - APP_URL=${FRONTEND_ORIGIN}
      - RECEIPT_DASHBOARD_URL=${FRONTEND_ORIGIN}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - yoru_network

volumes:
  api_data:
    name: yoru_api_data
  redis_data:
    name: yoru_redis_data

networks:
  yoru_network:
    name: yoru_network
    driver: bridge
