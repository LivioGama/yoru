server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Old cached bundles may still ask for Vercel Analytics on self-hosted
    # installs. Return an empty success instead of noisy 404s.
    location = /_vercel/insights/script.js {
        access_log off;
        return 204;
    }

    # Browser/platform icon fallbacks. The app's canonical icon is yoru-mark.png.
    location = /favicon.ico {
        try_files /yoru-mark.png =404;
    }

    location = /apple-touch-icon.png {
        try_files /yoru-mark.png =404;
    }

    location = /apple-touch-icon-precomposed.png {
        try_files /yoru-mark.png =404;
    }

    # SPA routing - handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
