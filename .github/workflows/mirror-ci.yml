# CI for the PUBLIC mirror (TsukumoHQ/yoru) — ships there via
# scripts/mirror-filter.sh so external PRs (e.g. TsukumoHQ/yoru#6/#7, which
# landed with zero checks) get gates. Every job is hard-gated on the mirror
# repository, so in the dev repo (helios-code/overnight-saas) this file is
# inert and ci.yml remains the only gate — no duplicate runs.
#
# ⚠ Shipping this file through the mirror requires MIRROR_PUSH_TOKEN to carry
# the `workflow` scope (classic PAT) — GitHub refuses pushes that create or
# update .github/workflows/* with a repo-scope-only token. Add the scope to
# the PAT BEFORE merging, or the next mirror.yml force-push fails.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: mirror-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend — pytest
    if: github.repository == 'TsukumoHQ/yoru'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: uv sync (with dev extras)
        run: uv sync --extra dev
      - name: pytest
        run: uv run pytest -q

  frontend-build:
    name: Frontend — build + typecheck
    if: github.repository == 'TsukumoHQ/yoru'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: vite build
        run: npm run build
      - name: tsc --noEmit
        run: npx tsc -b --noEmit

  workspace-root:
    name: Workspace — root npm ci
    if: github.repository == 'TsukumoHQ/yoru'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Guards the filtered manifests: the dev repo strips the private
      # marketing workspace at mirror time; if that rewrite regresses, this
      # is the job that catches it (instead of a contributor).
      - name: npm ci (dry run)
        run: npm ci --dry-run --no-audit --no-fund

  docker-build:
    name: Docker — smoke build
    if: github.repository == 'TsukumoHQ/yoru'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: docker build backend
        run: docker build -t yoru-api:ci backend/
      - name: docker build frontend (root context)
        run: docker build -f frontend/Dockerfile -t yoru-frontend:ci .
